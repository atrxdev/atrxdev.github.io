<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wrench favicon">
  <defs>
    <linearGradient id="bg" x1="12" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1c25" />
      <stop offset="1" stop-color="#0f1117" />
    </linearGradient>
    <linearGradient id="metal" x1="20" y1="16" x2="44" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc" />
      <stop offset="1" stop-color="#6366f1" />
    </linearGradient>
    <mask id="wrench-cutout">
      <rect width="64" height="64" fill="#fff" />
      <circle cx="32" cy="20" r="4.75" fill="#000" />
      <rect x="32" y="0" width="20" height="20" fill="#000" />
      <circle cx="32" cy="42" r="2.75" fill="#000" />
    </mask>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)" />
  <rect x="4" y="4" width="56" height="56" rx="16" fill="none" stroke="#2a2d3a" stroke-width="2" />

  <g transform="rotate(-45 32 32)" mask="url(#wrench-cutout)">
    <circle cx="32" cy="20" r="10" fill="url(#metal)" />
    <rect x="27.5" y="20" width="9" height="28" rx="4.5" fill="url(#metal)" />
  </g>
</svg>
