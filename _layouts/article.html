---
layout: default
---

<div class="breadcrumb">
  <a href="/">Home</a><span class="sep">/</span>
  <a href="/articles.html">Articles</a><span class="sep">/</span>
  {{ page.title }}
</div>

<article class="article-content">
  <header class="article-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}<time class="article-date">{{ page.date | date: "%B %d, %Y" }}</time>{% endif %}
    {% if page.description %}<p class="article-description">{{ page.description }}</p>{% endif %}
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
