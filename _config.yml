title: ATRX Dev
description: Free browser-based developer tools and practical articles for security, data conversion, debugging, productivity, and everyday coding workflows.

collections:
  tools:
    output: true
    permalink: /tools/:name
  articles:
    output: true
    permalink: /articles/:name

url: https://atrxtools.com
baseurl: ""

plugins:
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
